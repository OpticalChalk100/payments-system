services:
  # Backend Express API Service
  - type: web
    name: payments-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: payments-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: payments-frontend
          property: host

  # Frontend Next.js Client Service
  - type: web
    name: payments-frontend
    env: node
    plan: free
    rootDir: digital-wallet-next
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: BACKEND_URL
        fromService:
          type: web
          name: payments-backend
          property: host

databases:
  - name: payments-db
    plan: free
